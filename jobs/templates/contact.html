{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <h2>Contact Us</h2>
  <p>If you have any questions or need support, feel free to reach out:</p>

  <ul class="list-group mt-3">
    <li class="list-group-item"><strong>Email:</strong> support@jobmarketplace.com</li>
    <li class="list-group-item"><strong>Phone:</strong> +91 98765 43210</li>
    <li class="list-group-item"><strong>Address:</strong> Bengaluru, Karnataka, India</li>
  </ul>

  <h4 class="mt-4">Send us a message</h4>
  <form method="post" class="mt-3">
    {% csrf_token %}
    <div class="mb-3">
      <label for="name" class="form-label">Your Name</label>
      <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Your Email</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="mb-3">
      <label for="message" class="form-label">Message</label>
      <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send</button>
  </form>
</div>
{% endblock %}
