{% extends "base.html" %}
{% block content %}
<h2>{{ job.title }}</h2>
<p><strong>Company:</strong> {{ job.company }}</p>
<p><strong>Location:</strong> {{ job.location }}</p>
<p><strong>Salary:</strong> {{ job.salary }} {{ job.salary_type }}</p>
<p>{{ job.description }}</p>
<a href="{% url 'apply_job' job.id %}" class="btn btn-primary">Apply Now</a>
{% endblock %}
